# AdventureWorks — Full-Stack CI/CD Pipeline
# Builds API + Angular in parallel, deploys DbUp → API → Angular per environment.

trigger:
  - main

pool:
  vmImage: ubuntu-latest

variables:
  dotNetSdkVersion: '10.0.x'
  buildConfiguration: 'Release'
  azureSubscription: 'AdventureWorks-AzureDevOps-ServiceConnection'

stages:
  # --- Build (parallel) ---

  - stage: BuildAPI
    displayName: 'Build API'
    dependsOn: []
    jobs:
      - job: BuildDotNetAPI
        displayName: 'Build .NET API'
        steps:
          - template: pipelines/templates/build-api.yml
            parameters:
              dotNetSdkVersion: $(dotNetSdkVersion)
              buildConfiguration: $(buildConfiguration)

  - stage: BuildAngular
    displayName: 'Build Angular'
    dependsOn: []
    jobs:
      - job: BuildAngularWeb
        displayName: 'Build Angular Web'
        steps:
          - template: pipelines/templates/build-angular.yml

  # --- E2E smoke tests (Playwright) ---
  # Runs in parallel with the deploy stages below — intentionally not a dependency of DeployDev,
  # so a failure here (e.g. no real Entra test account provisioned yet, per US-991) never blocks
  # a deploy.
  - stage: E2ETests
    displayName: 'E2E Smoke Tests'
    dependsOn:
      - BuildAPI
      - BuildAngular
    variables:
      - group: 'AdventureWorks-Dev'
      - group: 'AdventureWorks-Dev-Secrets'
    jobs:
      - job: PlaywrightE2E
        displayName: 'Playwright E2E (adventureworks-web-e2e)'
        steps:
          - template: pipelines/templates/e2e.yml
            parameters:
              dotNetSdkVersion: $(dotNetSdkVersion)

  # --- Deploy Dev (auto on every main build) ---

  - template: pipelines/templates/deploy-stage.yml
    parameters:
      stageName: DeployDev
      displayName: 'Deploy to Development'
      dependsOn:
        - BuildAPI
        - BuildAngular
      environmentName: 'AdventureWorks-Dev'
      variableGroup: 'AdventureWorks-Dev'
      secretsVariableGroup: 'AdventureWorks-Dev-Secrets'
      azureSubscription: $(azureSubscription)
      dotNetSdkVersion: $(dotNetSdkVersion)

  # --- Deploy Prod (requires approval gate) ---

  - template: pipelines/templates/deploy-stage.yml
    parameters:
      stageName: DeployProd
      displayName: 'Deploy to Production'
      dependsOn:
        - DeployDev
      environmentName: 'AdventureWorks-Production'
      variableGroup: 'AdventureWorks-Prod'
      secretsVariableGroup: 'AdventureWorks-Prod-Secrets'
      azureSubscription: $(azureSubscription)
      dotNetSdkVersion: $(dotNetSdkVersion)
