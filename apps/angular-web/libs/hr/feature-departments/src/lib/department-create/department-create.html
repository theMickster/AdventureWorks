<div id="aw-department-create-page">
  <div id="aw-department-create-header" class="mb-6 flex items-center gap-4">
    <a id="aw-department-create-cancel-top" [routerLink]="['/hr/departments']" class="btn btn-ghost btn-sm">
      <i class="fa-solid fa-arrow-left" aria-hidden="true"></i>
      Back to Departments
    </a>
    <h1 class="text-2xl font-bold text-base-content">New Department</h1>
  </div>

  <div id="aw-department-create-form-container" class="max-w-lg">
    <form id="aw-department-create-form" [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
      <div class="space-y-4">
        <aw-input-field
          fieldId="department-create-name"
          label="Name"
          placeholder="Department name"
          formControlName="name"
          [errors]="nameErrors()"
        />

        <aw-select-field
          fieldId="department-create-group-name"
          label="Group Name"
          emptyOptionLabel="— Select group name —"
          formControlName="groupName"
          [options]="groupNameOptions()"
          [errors]="groupNameErrors()"
        />
      </div>

      <div class="mt-6 flex gap-3">
        <button id="aw-department-create-save" type="submit" class="btn btn-primary" [disabled]="isSaving()">
          @if (isSaving()) {
            <span class="loading loading-spinner loading-sm" aria-hidden="true"></span>
          }
          Save
        </button>
        <a id="aw-department-create-cancel" [routerLink]="['/hr/departments']" class="btn btn-ghost">Cancel</a>
      </div>
    </form>
  </div>
</div>
