<div id="aw-department-list-page">
  <div id="aw-department-list-header" class="mb-6 flex items-center justify-between">
    <h1 class="text-2xl font-bold text-base-content">Departments</h1>
    <a id="aw-department-list-new-btn" [routerLink]="['/hr/departments/new']" class="btn btn-primary btn-sm">
      <i class="fa-solid fa-plus" aria-hidden="true"></i>
      New Department
    </a>
  </div>

  <div id="aw-department-list-toolbar" class="mb-4 flex flex-wrap items-end gap-2">
    <div class="min-w-48">
      <label for="aw-department-group-filter" class="fieldset-legend">Group Name</label>
      <select
        id="aw-department-group-filter"
        class="select select-bordered w-full"
        [value]="groupNameFilter()"
        (change)="onGroupNameFilterChange($any($event.target).value)"
        aria-label="Filter departments by group name"
      >
        <option value="">All group names</option>
        @for (group of groupNameOptions(); track group) {
          <option [value]="group">{{ group }}</option>
        }
      </select>
    </div>
    <p id="aw-department-list-count" class="text-sm text-secondary pb-2">
      {{ filteredDepartments().length }} of {{ departments().length }} departments
    </p>
  </div>

  <aw-data-table
    fieldId="aw-department-list-table"
    [columns]="columns"
    [data]="rows()"
    [loading]="isLoading()"
    emptyTitle="No departments found"
    emptyDescription="Try selecting a different group name."
  >
    <ng-template awColumnDef="view" let-row>
      <a [routerLink]="[row['id']]" class="btn btn-ghost btn-xs">View</a>
    </ng-template>
  </aw-data-table>
</div>
