<fieldset [id]="fieldId() + '-fieldset'" class="fieldset">
  @if (label()) {
    <legend class="fieldset-legend">
      <label [for]="fieldId() + '-select'">
        {{ label() | translate }}
        @if (required()) {
          <span class="text-base-content/60" aria-hidden="true">*</span>
          <span class="sr-only">required</span>
        }
      </label>
    </legend>
  }
  <select
    [id]="fieldId() + '-select'"
    [class]="selectClass()"
    [disabled]="cva.disabled()"
    [attr.aria-invalid]="!!errors()"
    [attr.aria-required]="required()"
    [attr.aria-describedby]="ariaDescribedBy()"
    (change)="onChange($event)"
    (blur)="onBlur()"
  >
    @if (emptyOptionLabel()) {
      <option value="" disabled [selected]="!cva.value()">
        {{ emptyOptionLabel() | translate }}
      </option>
    }
    @for (opt of options(); track opt.value) {
      <option [value]="opt.value" [selected]="opt.value.toString() === cva.value()">
        {{ opt.label | translate }}
      </option>
    }
  </select>
  @if (hint() && !errors()) {
    <p [id]="fieldId() + '-hint'" class="fieldset-label">{{ hint() | translate }}</p>
  }
  @for (entry of errorEntries(); track entry[0]) {
    <p [id]="fieldId() + '-error-' + entry[0]" class="fieldset-label text-error">
      {{ entry[1] | translate }}
    </p>
  }
</fieldset>
