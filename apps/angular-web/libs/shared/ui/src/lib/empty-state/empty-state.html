<div [id]="fieldId()" class="flex flex-col items-center justify-center gap-4 py-12 text-center">
  <i [class]="icon() + ' text-4xl text-base-content/30'" aria-hidden="true"></i>
  <h3 [id]="fieldId() + '-title'" class="text-lg font-semibold text-base-content">
    {{ title() | translate }}
  </h3>
  @if (description()) {
    <p [id]="fieldId() + '-description'" class="max-w-sm text-sm text-base-content/60">
      {{ description() | translate }}
    </p>
  }
  <ng-content />
</div>
